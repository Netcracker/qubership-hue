#################################################
## Qubership custom template. HTTPRoute for hUE when using a Kubernetes Gateway instead of an Ingress.
#################################################
{{- if  .Values.gateway.enabled -}}
{{- $fullname := (include "hue.fullname" .) }}
{{- $Global := . }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullname }}
  namespace: {{ .Release.Namespace }}
  labels:
    tier: hue
    component: hue-httproute
    release: {{ .Release.Name }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    heritage: {{ .Release.Service }}
    {{- include "hue.labels" $Global  | nindent 4 }}
    {{- tpl (toYaml .Values.gateway.labels) . | nindent 4 }}
    
  {{- with .Values.gateway.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.gateway.parentRefs }}
  parentRefs:
    {{- tpl (toYaml .) $Global | nindent 4 }}
  {{- end }}
  {{- with .Values.gateway.hostnames }}
  hostnames:
    {{- tpl (toYaml .) $Global | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.gateway.rules }}
    - matches:
        {{- if .matches }}
        {{- toYaml .matches | nindent 8 }}
        {{- else }}
        - path:
            type: {{ .path.type | default "PathPrefix" }}
            value: {{ .path.value | default "/" }}
        {{- end }}
      {{- if .filters }}
      filters:
        {{- toYaml .filters | nindent 8 }}
      {{- end }}
      backendRefs:
        - group: ''
          kind: Service
          name: {{ $fullname }}
          port: {{ (index .backendRefs 0).port | int }}
          {{- if .weight }}
          weight: {{ .weight }}
          {{- else }}
          weight: 1
          {{- end }}
    {{- end }}

---
#################################################
## Qubership custom template. BackendTLSPolicy for TLS communication between the gateway and the Hue
#################################################
{{- if  .Values.gateway.backendTLSPolicy.enabled -}}
{{- $fullname := (include "hue.fullname" .) }}
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: {{ $fullname }}-backend-tls-policy
  namespace: {{ .Release.Namespace }}
  labels:
    tier: hue
    component: hue-httproute
    release: {{ .Release.Name }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    heritage: {{ .Release.Service }}
    {{- include "hue.labels" $Global  | nindent 4 }}
  {{- with .Values.gateway.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  targetRefs:
  - group: ""
    kind: Service
    name: {{ $fullname }}
  validation:
    {{- if  .Values.gateway.backendTLSPolicy.hostname }}
    hostname: {{ tpl .Values.gateway.backendTLSPolicy.hostname $Global  | quote }}
    {{- end }}
    {{- if  .Values.gateway.backendTLSPolicy.subjectAltNames }}
    subjectAltNames:
    {{- toYaml .Values.gateway.backendTLSPolicy.subjectAltNames | nindent 6 }}
    {{- end }}
    {{- if  .Values.gateway.backendTLSPolicy.caCertificateRefs }}
    caCertificateRefs:
    {{- toYaml .Values.gateway.backendTLSPolicy.caCertificateRefs | nindent 6 }}
    {{- end }}
    {{- if  .Values.gateway.backendTLSPolicy.wellKnownCACertificates }}
    wellKnownCACertificates: {{ tpl .Values.gateway.backendTLSPolicy.wellKnownCACertificates $Global  | quote }}
    {{- end }}
{{- end }}

---
#################################################
## Qubership custom template. HTTPRoute for redirecting HTTP traffic to HTTPS if TLS is enabled on the gateway.
#################################################
{{ if  .Values.gateway.redirectRoute.enabled -}}
{{- $fullname := (include "hue.fullname" .) }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullname }}-redirect
  namespace: {{ .Release.Namespace }}
  labels:
    tier: hue
    component: hue-httproute
    release: {{ .Release.Name }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    heritage: {{ .Release.Service }}
    {{- include "hue.labels" $Global  | nindent 4 }}
    {{- tpl (toYaml .Values.gateway.labels) . | nindent 4 }}
  {{- with .Values.gateway.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.gateway.redirectRoute.parentRefs }}
  parentRefs:
    {{- tpl (toYaml .) $Global  | nindent 4 }}
  {{- end }}
  {{- with .Values.gateway.hostnames }}
  hostnames:
    {{- tpl (toYaml .) $Global  | nindent 4 }}
  {{- end }}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
{{- end }}
{{- end -}}

