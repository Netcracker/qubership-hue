########################################
# Definition for the different objects
#
# Configured to stream exclusively to stdout/stderr.
# No files are written to disk.
########################################

[logger_root]
level=NOTSET
handlers=stderr

[logger_access]
level=NOTSET
handlers=stdout
qualname=access

[logger_django_auth_ldap]
level=NOTSET
handlers=stdout
qualname=django_auth_ldap

[logger_kazoo_client]
level=NOTSET
handlers=stderr
qualname=kazoo.client

[logger_djangosaml2]
level=NOTSET
handlers=stderr
qualname=djangosaml2

[logger_requests_packages_urllib3_connectionpool]
level=NOTSET
handlers=stderr
qualname=requests.packages.urllib3.connectionpool

[logger_django_db]
level=NOTSET
handlers=stderr
qualname=django.db.backends

[logger_boto]
level=NOTSET
handlers=stderr
qualname=boto

[logger_boto3]
level=NOTSET
handlers=stderr
qualname=boto3

[logger_botocore]
level=NOTSET
handlers=stderr
qualname=botocore

# Streams all system and error logs cleanly to standard error stream
[handler_stderr]
class=StreamHandler
formatter=default
level=NOTSET
args=(sys.stderr,)

# Streams all web access logs cleanly to standard output stream
[handler_stdout]
class=StreamHandler
formatter=access
level=NOTSET
args=(sys.stdout,)

[formatter_default]
class=logging.Formatter
format=[%(asctime)s] %(module)-12s %(levelname)-8s %(message)s
datefmt=%d/%b/%Y %H:%M:%S %z

[formatter_access]
class=logging.Formatter
format=[%(asctime)s] %(levelname)-8s %(message)s
datefmt=%d/%b/%Y %H:%M:%S %z

########################################
# A summary of loggers, handlers and formatters
########################################

[loggers]
keys=root,access,django_auth_ldap,kazoo_client,requests_packages_urllib3_connectionpool,djangosaml2,django_db,boto,boto3,botocore

[handlers]
keys=stderr,stdout

[formatters]
keys=default,access